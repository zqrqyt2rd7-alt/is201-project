<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Surf Catch Game</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #4facfe, #00f2fe);
  }

  canvas {
    display: block;
  }

  #ui {
    position: absolute;
    top: 10px;
    left: 20px;
    color: white;
    font-size: 20px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
  }

  #homeBtn {
    position: absolute;
    top: 10px;
    right: 20px;
    background: #ffffffcc;
    color: #333;
    padding: 8px 14px;
    border-radius: 10px;
    text-decoration: none;
    font-size: 16px;
    font-weight: bold;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    transition: all 0.2s ease;
  }

  #homeBtn:hover {
    background: #ffcc00;
    transform: scale(1.05);
  }

  #gameOver {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 40px;
    display: none;
    text-align: center;
  }

  button {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #ffcc00;
  }
</style>
</head>
<body>

<div id="ui">
  Score: <span id="score">0</span> |
  Lives: <span id="lives">3</span>
</div>

<a href="scratch.html" id="homeBtn">🏠 Home</a>

<div id="gameOver">
  Game Over<br>
  <button onclick="restartGame()">Restart</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
let lives = 3;
let gameRunning = true;

const surfboard = {
  width: 100,
  height: 20,
  x: canvas.width / 2 - 50,
  y: canvas.height - 50
};

const emojis = [];
const emojiTypes = ["🏄", "🌊", "🐬"];

function spawnEmoji() {
  emojis.push({
    x: Math.random() * canvas.width,
    y: -30,
    size: 30,
    speed: 2 + Math.random() * 3,
    type: emojiTypes[Math.floor(Math.random() * emojiTypes.length)]
  });
}

function drawSurfboard() {
  ctx.fillStyle = "#ff7f50";
  ctx.beginPath();
  ctx.roundRect(surfboard.x, surfboard.y, surfboard.width, surfboard.height, 10);
  ctx.fill();
}

function drawEmojis() {
  ctx.font = "28px Arial";
  emojis.forEach(e => {
    ctx.fillText(e.type, e.x, e.y);
  });
}

function updateEmojis() {
  for (let i = emojis.length - 1; i >= 0; i--) {
    const e = emojis[i];
    e.y += e.speed;

    // collision
    if (
      e.y > surfboard.y &&
      e.x > surfboard.x &&
      e.x < surfboard.x + surfboard.width
    ) {
      score++;
      emojis.splice(i, 1);
      updateUI();
    }
    // missed
    else if (e.y > canvas.height) {
      lives--;
      emojis.splice(i, 1);
      updateUI();

      if (lives <= 0) {
        endGame();
      }
    }
  }
}

function updateUI() {
  document.getElementById("score").textContent = score;
  document.getElementById("lives").textContent = lives;
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawSurfboard();
  drawEmojis();
}

function gameLoop() {
  if (!gameRunning) return;

  updateEmojis();
  draw();

  requestAnimationFrame(gameLoop);
}

function endGame() {
  gameRunning = false;
  document.getElementById("gameOver").style.display = "block";
}

function restartGame() {
  score = 0;
  lives = 3;
  emojis.length = 0;
  gameRunning = true;
  document.getElementById("gameOver").style.display = "none";
  updateUI();
  gameLoop();
}

// mouse control
canvas.addEventListener("mousemove", e => {
  surfboard.x = e.clientX - surfboard.width / 2;
});

// spawn loop
setInterval(() => {
  if (gameRunning) spawnEmoji();
}, 800);

// start game
updateUI();
gameLoop();
</script>

</body>
</html>
